<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio Personal</title>
    <link rel="icon" type="image/x-icon" href="Img/icono.ico">
  <style>
    body {
        background-color: #E6BFFF; 
        font-family: sans-serif;
        padding: 20px;
        margin: 0; }

      .portfolio-container {
        max-width: 1400px; 
        margin: 0 auto;  }

      .banner-contenedor-fijo {
        width: 100%;
        position: relative;
        height: 0;
        padding-top: 45%; 
        
        background-image: url('Img/PORTAFOLIO2.png'); 
        background-size: 100% 100%;
        background-repeat: no-repeat;
        background-position: center;  
        border-radius: 25px;   }

      .redes-banner {
        position: absolute;
        
        bottom: 14%;    
        right: 12%;   
        
        display: flex;
        gap: 18px;  }

      .redes-banner a img {
        width: 75px;        
        height: 75px;
        object-fit: contain;
        display: block;
        transition: transform 0.2s ease; }

      .redes-banner a img:hover {
        transform: scale(1.25);  }

      h1 {
        text-align: center;
        margin-top: 25px;
        font-size: 2.5rem;
        letter-spacing: 3px;
        color: #333; }
    
     section {
        display: flex;
        flex-direction: row;       /* Alinea texto e imagen de lado a lado */
        justify-content: space-between;
        align-items: stretch;      /* Ambas tarjetas tendrán la misma altura */
        gap: 30px;                 /* Separación física entre ambas cajas */
        background-color: transparent; /* Quitamos el fondo anterior para usar los individuales */
        padding: 0;                /* Reseteamos padding para que no interfiera */
        margin-top: 30px;  }

     .tarjeta-texto {
        flex: 1.2;         
        background: linear-gradient(135deg, #4300d2, #d241f6); 
        padding: 40px;
        border-radius: 24px;  
        color: #ffffff;     }

    .tarjeta-texto h2 {
        font-size: 2.3rem;
        margin-top: 0;
        margin-bottom: 20px;
        color: #ffffff;
        font-weight: bold; }

    .tarjeta-texto p {
        font-size: 1.15rem;
        line-height: 1.6;
        margin-bottom: 15px;  }

    .carousel-container {
        flex: 1;             
        position: relative;
        width: 100%;
        max-width: 450px; 
        border-radius: 24px; 
        overflow: hidden; 
        aspect-ratio: 1 / 1;   }

    .carousel-slides {
        width: 100%;
        height: 100%;
        position: relative; 
    }

    .slide {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover; 
        opacity: 0; 
        transition: opacity 0.8s ease-in-out; 
    }

    .slide.active {
        opacity: 1; 
    }

    .conejito-mascota {
        position: absolute;
        bottom: -15px;
        right: -15px;
        width: 115px;          
        z-index: 10; 
        pointer-events: none;   }

    /* ==========================================
       DISEÑO RESPONSIVO (Celulares y tablets pequeñas)
       ========================================== */
    @media (max-width: 768px) {
        section {
            flex-direction: column; 
            align-items: center;
            gap: 20px;   }
        
        .carousel-container {
            max-width: 100%;   
        }
    }
    </style>
  </head>
  <body>

    <div class="portfolio-container">
      
      <header>  
        <div class="banner-contenedor-fijo">    
          <div class="redes-banner">
            <a href="https://www.instagram.com/aimi.eiko?igsh=dmd1cDl1cmY3anc0" target="_blank">
              <img src="Img/instagram.png" alt="Instagram">
            </a>
            <a href="https://www.youtube.com/@aimieiko" target="_blank">
              <img src="Img/youtube.png" alt="YouTube">
            </a>
            <a href="https://www.tiktok.com/@aimi_eiko" target="_blank">
              <img src="Img/tiktok2.png" alt="TikTok">
            </a>
          </div>

        </div>

        <h1>AIMI EIKO</h1>
      </header>
      <section>
        
  <div class="tarjeta-texto">
    <h2>CONÓCEME</h2>
    <p>¡Hola! Soy Daniela, Diseñadora Gráfica e Ilustradora.</p>
    
    <h3>Mis herramientas digitales</h3>
    <ul>
      <li>Adobe Illustrator</li>
      <li>Adobe Photoshop</li>
      <li>After Effects</li>
      <li>Paint Tool SAI</li>
      <li>Virtual Code Studio</li>
    </ul>

    <h3>Mis próximos idiomas a aprender</h3>
    <ol>
      <li>Inglés</li>
      <li>Portugués</li>
      <li>Japonés</li>
    </ol>
  </div>

  <!-- COLUMNA DERECHA: El carrusel de imágenes -->
  <div class="carousel-container">
    <div class="carousel-slides">
    
    <img src="Img/diseñador.png" class="slide active" alt="Diseñadora">
    <img src="Img/foto2.png" class="slide" alt="Foto con mi peluche maid">
    <img src="Img/foto1.png" class="slide" alt="Foto con mi peluche emo">
  </div>
  <img src="Img/bunny.png" class="conejito-mascota" alt="Mascota">
</div>
      </section>
    <script>
    let currentSlide = 0;
    const slides = document.querySelectorAll('.slide');
    const totalSlides = slides.length;
    const tiempoDeEspera = 5000;

    function siguienteFoto() {
      slides[currentSlide].classList.remove('active');
      currentSlide = (currentSlide + 1) % totalSlides;
      slides[currentSlide].classList.add('active'); }
    setInterval(siguienteFoto, tiempoDeEspera);
  </script>
  </body>
</html>
